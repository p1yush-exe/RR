# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini"
  - "OpenAI Codex"

ai_usage_summary: |
  Used Claude, Gemini, and Codex for code generation, logic building, pipeline debugging, and generating the offline XGBoost training pipeline. No real candidate data was sent to any LLM; everything was engineered directly.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Two-stage architecture. Stage 1 is an O(N) heuristic pass computing 9 JD-fit sub-scores (titles, tenure trajectory, etc.) and 23 behavior signals combined via geometric mean to prevent single-signal masking. Explicit honeypots and research-only profiles are dropped using logical rules (e.g., YOE vs. tenure mismatch). Stage 2 is an XGBRanker (LambdaMART) over the top 2000 heuristic candidates. Ranks 100K profiles in ~25s on CPU.

