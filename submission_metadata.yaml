methodology_summary: >
  Two-stage pipeline. Stage 1: O(N) streaming heuristic filter scoring JD fit
  (9 weighted sub-scores) and recruitability (23 behavioral signals via grouped
  geometric means). Honeypot detection drops impossible profiles. Top 1000 kept
  in a min-heap. Stage 2: pre-trained XGBRanker (LambdaMART, objective=rank:ndcg)
  re-ranks top 1000 using 11 features. Top 100 output with fact-based reasoning.
  No runtime API calls, no GPU, no network.
